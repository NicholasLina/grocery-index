name: Scheduled StatCan Scraper

on:
  schedule:
    # Runs every day at 05:00 UTC
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  import-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: Scraper
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      API_BASE_URL: ${{ vars.API_BASE_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Import latest StatCan data
        run: python import-statcan-data.py

      - name: Warm up API-calculated collections
        run: npm run warmup
        working-directory: backend

      - name: Upload scraper logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-scraper-logs
          path: |
            ${{ github.workspace }}/**/*.log
            ${{ github.workspace }}/**/npm-debug.log*
            ${{ github.workspace }}/**/.npm/_logs/**
          if-no-files-found: ignore

      - name: Notify Slack on failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          BRANCH: ${{ github.ref_name }}
        run: |
          payload=$(cat <<EOF
          {
            "text": ":rotating_light: Scheduled StatCan scraper failed",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Scheduled StatCan scraper failed*\\n• Repository: ${REPO}\\n• Branch: ${BRANCH}\\n• Run: #${RUN_NUMBER}\\n• Logs: https://github.com/${REPO}/actions/runs/${RUN_ID}"
                }
              }
            ]
          }
          EOF
          )
          curl -sS -X POST -H "Content-type: application/json" --data "$payload" "$SLACK_WEBHOOK_URL"
